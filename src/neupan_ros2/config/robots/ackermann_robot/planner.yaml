# NeuPAN Planner Configuration — Ackermann Robot (AckermannRobot-2D)
#
# Vehicle: 0.70m × 0.52m, wheelbase 0.593m
# Physical single-wheel limit: 0.52 rad; center-equivalent limit: 0.43 rad
# Min turning radius: 1.30m = wheelbase / tan(center_steering_limit)
# Supports reverse: min_vel_x = -0.5 m/s
#
# This is the RUNTIME config. The DUNE checkpoint path is set at runtime
# by neupan_node (via the pan.dune_checkpoint override).
#
# Must match the training config in all robot geometry fields —
# the DUNE weights are geometry-specific.

# ---- MPC ------------------------------------------------------------
receding: 15                     # Horizon steps (15 × 0.2s = 3s look-ahead)
step_time: 0.2                   # Time per step (s)
ref_speed: 1.0                   # Reference cruise speed (m/s)
device: 'cpu'
time_print: false
collision_threshold: 0.05        # Emergency stop distance (m)

# ---- Robot Geometry -------------------------------------------------
robot:
  kinematics: 'acker'
  max_speed: [1.5, 0.43]         # [linear m/s, center steering rad]
  min_speed: [-0.5, -0.43]       # Allow reverse
  max_acce: [1.0, 0.5]           # [linear m/s², steering rad/s²]
  length: 0.70                    # Overall length (m) — chassis collision box
  width: 0.52                     # Overall width (m) — rear track
  wheelbase: 0.593                # Front-rear axle distance (m)

# ---- Initial Path ---------------------------------------------------
ipath:
  interval: 0.1                   # Waypoint spacing (m)
  curve_style: 'reeds'            # Reeds-Shepp: forward + reverse, ackermann-aware
  min_radius: 1.30                # Min turn radius (m) = wheelbase / tan(0.43)
  loop: false
  arrive_threshold: 0.5           # "Arrived" distance (m)
  close_threshold: 0.1
  arrive_index_threshold: 3

# ---- PAN Algorithm --------------------------------------------------
pan:
  iter_num: 2
  dune_max_num: 200
  nrmp_max_num: 10
  dune_checkpoint: null           # Set at runtime by neupan_node

# ---- Control Tuning -------------------------------------------------
# Tuned per the NeuPAN parameter normalization guide (see docs/neupan_tuning.md).
# Robot characteristic scales: L₀=0.70m (length), v₀=1.0m/s (cruise speed)
#   q_s ≈ 1.1 / L₀ = 0.5    → Δx=0.21m (30% L₀) costs 0.011 — MPC cares about tracking
#   p_u ≈ 0.75 / v₀ = 0.3   → Δv=0.3m/s (30% v₀) costs 0.008 — doesn't suppress speed
#   η  = 4.0                 → avoidance:tracking ≈ 180:1 (was 8300:1 — dominated!)
#   d_max ≈ 0.7 × L₀ = 0.5  → reasonable 70% body-length awareness
#   d_min ≈ 0.07 × L₀ = 0.05 → emergency brake at 7% body-length
adjust:
  q_s: 0.5                       # State tracking weight [0.0225->0.25 effective]
  p_u: 0.3                       # Control effort weight [0.25->0.09 effective]
  eta: 4.0                       # Collision avoidance weight [15->4]
  d_max: 0.5                      # Max obstacle distance for barrier (m) — 0.7 L₀
  d_min: 0.05                     # Min obstacle distance for barrier (m) — 0.07 L₀
