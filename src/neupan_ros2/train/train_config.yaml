# NeuPAN DUNE Training Config — Ackermann Robot (AckermannRobot-2D)
#
# Vehicle: 0.70m × 0.52m, wheelbase 0.593m
# Physical single-wheel limit: 0.52 rad; center-equivalent limit: 0.43 rad
# Min turning radius: 1.30m = wheelbase / tan(center_steering_limit)
#
# This is a TRAINING config. The train section below defines how DUNE
# (the obstacle-distance encoder MLP) is trained for THIS robot geometry.
# Training data is synthetic — random 2D points + CVXPY optimization.
# No simulation or real driving data is needed.

# ---- MPC --------------------------------------------------
receding: 15               # MPC horizon steps (15 × 0.2s = 3s look-ahead)
step_time: 0.2             # Time per step (seconds)
ref_speed: 1.0             # Reference cruise speed (m/s)
device: 'cpu'
time_print: false
collision_threshold: 0.05  # Emergency stop when obstacle within this distance (m)

# ---- Robot Geometry ---------------------------------------
robot:
  kinematics: 'acker'
  max_speed: [1.5, 0.43]    # [linear m/s, center steering rad]
  min_speed: [-0.5, -0.43]  # Allow reverse
  max_acce: [1.0, 0.5]     # [linear m/s², angular rad/s²]
  length: 0.70              # Overall length (m)
  width: 0.52               # Overall width (m)
  wheelbase: 0.593          # Front-rear axle distance (m)

# ---- Initial Path Generation ------------------------------
ipath:
  interval: 0.1             # Waypoint spacing along path (m)
  curve_style: 'reeds'      # Reeds-Shepp: forward + reverse, ackermann-aware
  min_radius: 1.30          # Min turn radius (m) = wheelbase / tan(0.43)
  loop: false
  arrive_threshold: 0.5     # Considered "arrived" within this distance (m)
  close_threshold: 0.1      # Waypoint "reached" threshold (m)
  arrive_index_threshold: 3

# ---- PAN Algorithm ----------------------------------------
pan:
  iter_num: 2               # NRMP/DUNE alternating iterations
  dune_max_num: 200         # Max DUNE feasible points per step
  nrmp_max_num: 10          # Max NRMP reference points
  dune_checkpoint: null     # Set at runtime (this is training, so null)

# ---- Control Tuning ---------------------------------------
adjust:
  q_s: 0.15                 # State tracking weight (higher = tighter tracking)
  p_u: 0.5                  # Control effort weight (higher = smoother, slower)
  eta: 15.0                 # Collision avoidance weight (higher = more cautious)
  d_max: 0.5                # Max obstacle distance for barrier function (m)
  d_min: 0.05               # Min obstacle distance for barrier function (m)

# ---- DUNE Training ----------------------------------------
train:
  direct_train: true
  model_name: 'ackermann_robot_default'  # Output dir under train/model/
  data_size: 200000                     # Number of random points to generate
  data_range: [-30, -30, 30, 30]        # Point sampling range [x_min, y_min, x_max, y_max]
  batch_size: 256
  epoch: 5000
  valid_freq: 250                       # Print validation loss every N epochs
  save_freq: 500                        # Save checkpoint every N epochs
  lr: 5e-5                              # Adam learning rate
  lr_decay: 0.5                         # LR halved every decay_freq epochs
  decay_freq: 1500
