ekf_filter_node:
  ros__parameters:
    # ====== 基本设置 ======
    frequency: 30.0              # EKF 更新频率 (Hz)
    sensor_timeout: 0.1          # 传感器超时 (秒)
    two_d_mode: true             # 2D 模式 (只追踪 x, y, yaw)
    publish_tf: true             # 发布 odom→base_link TF（AMCL 和 Nav2 需要）

    # ====== 坐标系 ======
    map_frame: map
    odom_frame: odom
    base_link_frame: base_link
    world_frame: odom

    # ====== 轮式里程计 ======
    # 注意：control.xacro 将 controller odometry 重映射为 /odom_wheel
    odom0: /odom_wheel
    odom0_config:
      [
        true,  true,  false,   # position: x, y (无 z)
        false, false, true,    # orientation: yaw (无 roll/pitch)
        true,  false, false,   # linear velocity: x (侧滑忽略)
        false, false, true,    # angular velocity: yaw
        false, false, false    # acceleration: 不使用
      ]
    odom0_differential: false
    odom0_queue_size: 20

    # ====== IMU (角速度用于修正偏航) ======
    imu0: /imu/data
    imu0_config:
      [
        false, false, false,   # position: 不使用
        false, false, false,   # orientation: 不使用 (让轮式里程计处理 yaw)
        false, false, false,   # linear velocity: 不使用
        false, false, true,    # angular velocity: 仅 yaw 角速度
        false, false, false    # acceleration: 不使用
      ]
    imu0_differential: false
    imu0_relative: false
    imu0_queue_size: 20
